<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的预约 - 图书馆座位预约</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>

  <!-- 顶部导航栏 -->
  <nav class="user-navbar">
    <a href="user-index.html" class="user-navbar-back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <span class="user-navbar-title">我的预约</span>
    <span class="user-navbar-placeholder"></span>
  </nav>

  <!-- 页面内容 -->
  <div class="user-page">
    <div class="user-page-content">

      <!-- 空状态展示 -->
      <div class="section-block">
        <div class="empty-state">
          <div class="empty-state-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <p class="empty-state-text">暂无预约记录</p>
          <a href="seat-list.html" class="btn-custom btn-custom-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            去预约座位
          </a>
        </div>
      </div>

      <div class="divider"></div>

      <!-- 有预约记录时的展示（示例） -->
      <div class="section-block">
        <h3 class="section-title">预约记录示例</h3>
        <p class="text-small mb-lg">以下为有预约记录时的展示效果</p>

        <!-- 预约记录卡片 1：已预约 -->
        <div class="card-custom mb-md" style="border-left: 3px solid #2563EB;">
          <div class="d-flex justify-content-between align-items-start mb-sm">
            <div>
              <h4 class="text-h3" style="font-size:15px;">A区-01号座位</h4>
              <p class="text-small">3楼 A区</p>
            </div>
            <span class="badge-status badge-booked">已预约</span>
          </div>
          <div class="divider" style="margin: 8px 0;"></div>
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <p class="text-small mb-xs">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                2026-07-15
              </p>
              <p class="text-small">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                09:00 - 10:00
              </p>
            </div>
            <button class="btn-custom btn-custom-danger" style="height:32px; padding:0 16px; font-size:12px;">
              取消
            </button>
          </div>
        </div>

        <!-- 预约记录卡片 2：已过时 -->
        <div class="card-custom mb-md" style="border-left: 3px solid #EA580C;">
          <div class="d-flex justify-content-between align-items-start mb-sm">
            <div>
              <h4 class="text-h3" style="font-size:15px;">B区-05号座位</h4>
              <p class="text-small">2楼 B区</p>
            </div>
            <span class="badge-status badge-expired">已过时</span>
          </div>
          <div class="divider" style="margin: 8px 0;"></div>
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <p class="text-small mb-xs">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                2026-07-14
              </p>
              <p class="text-small">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                08:00 - 09:00
              </p>
            </div>
            <span class="text-small" style="color:#9CA3AF;">已结束</span>
          </div>
        </div>

        <!-- 预约记录卡片 3：已取消 -->
        <div class="card-custom mb-md" style="border-left: 3px solid #DC2626;">
          <div class="d-flex justify-content-between align-items-start mb-sm">
            <div>
              <h4 class="text-h3" style="font-size:15px;">C区-12号座位</h4>
              <p class="text-small">1楼 C区</p>
            </div>
            <span class="badge-status badge-cancelled">已取消</span>
          </div>
          <div class="divider" style="margin: 8px 0;"></div>
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <p class="text-small mb-xs">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                2026-07-14
              </p>
              <p class="text-small">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                14:00 - 15:00
              </p>
            </div>
            <span class="text-small" style="color:#9CA3AF;">已取消</span>
          </div>
        </div>
      </div>

      <!-- 底部安全留白 -->
      <div style="height:32px;"></div>
    </div>
  </div>

</body>
</html>
