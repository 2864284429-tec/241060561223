<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位管理 - 管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>

  <!-- 移动端顶部导航 -->
  <nav class="admin-mobile-nav">
    <button class="admin-mobile-nav-toggle" onclick="document.querySelector('.admin-sidebar').classList.toggle('show')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <span class="admin-mobile-nav-title">座位管理</span>
  </nav>

  <!-- 侧边栏 -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <span class="admin-sidebar-logo-text">图书馆管理后台</span>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="admin-booking.html" class="admin-sidebar-item">
        <span class="admin-sidebar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </span>
        预约管理
      </a>
      <a href="admin-seat.html" class="admin-sidebar-item active">
        <span class="admin-sidebar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        座位管理
      </a>
      <a href="admin-stats.html" class="admin-sidebar-item">
        <span class="admin-sidebar-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
        </span>
        统计
      </a>
    </nav>
  </aside>

  <!-- 主内容区 -->
  <main class="admin-content">

    <!-- 页面标题 + 操作按钮 -->
    <div class="d-flex justify-content-between align-items-center mb-xl">
      <div>
        <h1 class="text-h1" style="font-size:22px;">座位管理</h1>
        <p class="text-small mt-1">管理图书馆所有座位信息</p>
      </div>
      <button class="btn-custom btn-custom-primary" data-bs-toggle="modal" data-bs-target="#addSeatModal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        新增座位
      </button>
    </div>

    <!-- 筛选区 -->
    <div class="card-custom mb-xl">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label class="text-small mb-xs d-block">区域筛选</label>
          <select class="input-custom">
            <option>全部区域</option>
            <option>A区（3楼）</option>
            <option>B区（2楼）</option>
            <option>C区（1楼）</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="text-small mb-xs d-block">状态筛选</label>
          <select class="input-custom">
            <option>全部状态</option>
            <option>可用</option>
            <option>不可用</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="text-small mb-xs d-block">搜索座位</label>
          <input type="text" class="input-custom" placeholder="输入座位名称或编号">
        </div>
        <div class="col-md-2">
          <button class="btn-custom btn-custom-secondary btn-full-width">重置</button>
        </div>
      </div>
    </div>

    <!-- 座位列表表格 -->
    <div class="card-custom">
      <div class="table-responsive">
        <table class="table-custom">
          <thead>
            <tr>
              <th>编号</th>
              <th>座位名称</th>
              <th>位置</th>
              <th>容量</th>
              <th>设备</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>A-01</td>
              <td>3楼 A区</td>
              <td>1人</td>
              <td>电源</td>
              <td><span class="badge-status badge-available">可用</span></td>
              <td>
                <button class="btn-custom btn-custom-text" style="height:32px;padding:0 8px;font-size:12px;">编辑</button>
                <button class="btn-custom btn-custom-danger" style="height:32px;padding:0 8px;font-size:12px;">删除</button>
              </td>
            </tr>
            <tr>
              <td>2</td>
              <td>A-02</td>
              <td>3楼 A区</td>
              <td>1人</td>
              <td>电源、台灯</td>
              <td><span class="badge-status badge-available">可用</span></td>
              <td>
                <button class="btn-custom btn-custom-text" style="height:32px;padding:0 8px;font-size:12px;">编辑</button>
                <button class="btn-custom btn-custom-danger" style="height:32px;padding:0 8px;font-size:12px;">删除</button>
              </td>
            </tr>
            <tr>
              <td>3</td>
              <td>A-03</td>
              <td>3楼 A区</td>
              <td>2人</td>
              <td>电源</td>
              <td><span class="badge-status badge-disabled">不可用</span></td>
              <td>
                <button class="btn-custom btn-custom-text" style="height:32px;padding:0 8px;font-size:12px;">编辑</button>
                <button class="btn-custom btn-custom-danger" style="height:32px;padding:0 8px;font-size:12px;">删除</button>
              </td>
            </tr>
            <tr>
              <td>4</td>
              <td>B-01</td>
              <td>2楼 B区</td>
              <td>1人</td>
              <td>无</td>
              <td><span class="badge-status badge-available">可用</span></td>
              <td>
                <button class="btn-custom btn-custom-text" style="height:32px;padding:0 8px;font-size:12px;">编辑</button>
                <button class="btn-custom btn-custom-danger" style="height:32px;padding:0 8px;font-size:12px;">删除</button>
              </td>
            </tr>
            <tr>
              <td>5</td>
              <td>B-02</td>
              <td>2楼 B区</td>
              <td>4人</td>
              <td>电源、投影</td>
              <td><span class="badge-status badge-available">可用</span></td>
              <td>
                <button class="btn-custom btn-custom-text" style="height:32px;padding:0 8px;font-size:12px;">编辑</button>
                <button class="btn-custom btn-custom-danger" style="height:32px;padding:0 8px;font-size:12px;">删除</button>
              </td>
            </tr>
            <tr>
              <td>6</td>
              <td>C-01</td>
              <td>1楼 C区</td>
              <td>1人</td>
              <td>电源</td>
              <td><span class="badge-status badge-available">可用</span></td>
              <td>
                <button class="btn-custom btn-custom-text" style="height:32px;padding:0 8px;font-size:12px;">编辑</button>
                <button class="btn-custom btn-custom-danger" style="height:32px;padding:0 8px;font-size:12px;">删除</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 分页 -->
      <div class="d-flex justify-content-between align-items-center mt-lg">
        <span class="text-small">共 6 条记录</span>
        <div class="d-flex gap-sm">
          <button class="btn-custom btn-custom-secondary" style="height:32px;padding:0 12px;font-size:12px;" disabled>上一页</button>
          <button class="btn-custom btn-custom-primary" style="height:32px;padding:0 12px;font-size:12px;">1</button>
          <button class="btn-custom btn-custom-secondary" style="height:32px;padding:0 12px;font-size:12px;" disabled>下一页</button>
        </div>
      </div>
    </div>

  </main>

  <!-- 新增座位模态框 -->
  <div class="modal fade modal-custom" id="addSeatModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">新增座位</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-lg">
              <label class="text-small mb-xs d-block">座位名称 <span style="color:#DC2626;">*</span></label>
              <input type="text" class="input-custom" placeholder="例如：A-04">
            </div>
            <div class="mb-lg">
              <label class="text-small mb-xs d-block">位置 <span style="color:#DC2626;">*</span></label>
              <select class="input-custom">
                <option value="">请选择区域</option>
                <option>3楼 A区</option>
                <option>2楼 B区</option>
                <option>1楼 C区</option>
              </select>
            </div>
            <div class="mb-lg">
              <label class="text-small mb-xs d-block">容量 <span style="color:#DC2626;">*</span></label>
              <select class="input-custom">
                <option>1人</option>
                <option>2人</option>
                <option>4人</option>
              </select>
            </div>
            <div class="mb-lg">
              <label class="text-small mb-xs d-block">设备</label>
              <div class="d-flex gap-md flex-wrap">
                <label class="d-flex align-items-center gap-sm text-small cursor-pointer">
                  <input type="checkbox"> 电源
                </label>
                <label class="d-flex align-items-center gap-sm text-small cursor-pointer">
                  <input type="checkbox"> 台灯
                </label>
                <label class="d-flex align-items-center gap-sm text-small cursor-pointer">
                  <input type="checkbox"> 投影
                </label>
              </div>
            </div>
            <div class="mb-lg">
              <label class="text-small mb-xs d-block">状态</label>
              <select class="input-custom">
                <option>可用</option>
                <option>不可用</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-custom btn-custom-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn-custom btn-custom-primary">确认添加</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
