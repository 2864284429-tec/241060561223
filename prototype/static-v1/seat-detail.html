<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>座位详情 - A-01</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/custom.css" rel="stylesheet">
</head>
<body>
  <nav class="user-navbar">
    <a href="seat-list.html" class="user-navbar-back">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"></path>
      </svg>
    </a>
    <div class="user-navbar-title">座位详情</div>
    <div class="user-navbar-placeholder"></div>
  </nav>

  <div class="user-page">
    <div class="user-page-content">

      <div class="section-block">
        <div class="card-custom">
          <div class="d-flex justify-content-between align-items-start mb-md">
            <div>
              <div class="text-h1">A-01</div>
              <div class="text-body mt-1" style="color: var(--gray);">1楼 · 自习区A · 靠窗位置</div>
            </div>
            <span class="badge-status badge-available">可预约</span>
          </div>
          <div class="divider"></div>
          <div class="row g-3 mt-xl">
            <div class="col-4 text-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 4px;">
                <rect x="2" y="7" width="20" height="14" rx="2"></rect>
                <path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"></path>
              </svg>
              <div class="text-small">靠窗</div>
            </div>
            <div class="col-4 text-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 4px;">
                <path d="M5 12h14"></path>
                <path d="M12 5v14"></path>
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              </svg>
              <div class="text-small">有电源</div>
            </div>
            <div class="col-4 text-center">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 4px;">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 01-3.46 0"></path>
              </svg>
              <div class="text-small">安静区</div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-block">
        <div class="section-title">
          <div class="d-flex align-items-center gap-sm">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            选择预约日期
          </div>
        </div>
        <div class="d-flex gap-sm overflow-auto pb-2">
          <div class="card-custom text-center flex-shrink-0" style="min-width: 64px; padding: 12px; border-color: var(--primary); background: var(--primary-light);">
            <div class="text-small" style="color: var(--primary); font-weight: 500;">今天</div>
            <div class="text-h3" style="color: var(--primary);">14</div>
          </div>
          <div class="card-custom text-center flex-shrink-0" style="min-width: 64px; padding: 12px;">
            <div class="text-small">明天</div>
            <div class="text-h3">15</div>
          </div>
          <div class="card-custom text-center flex-shrink-0" style="min-width: 64px; padding: 12px;">
            <div class="text-small">后天</div>
            <div class="text-h3">16</div>
          </div>
          <div class="card-custom text-center flex-shrink-0" style="min-width: 64px; padding: 12px;">
            <div class="text-small">周五</div>
            <div class="text-h3">17</div>
          </div>
        </div>
      </div>

      <div class="section-block">
        <div class="section-title">
          <div class="d-flex align-items-center gap-sm">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            选择时间段
          </div>
        </div>
        <div class="text-small mb-md">每个时段为 1 小时，最多可选 3 个连续时段</div>
        <div class="time-slot-grid">
          <div class="time-slot-item selected">08:00</div>
          <div class="time-slot-item selected">09:00</div>
          <div class="time-slot-item selected">10:00</div>
          <div class="time-slot-item">11:00</div>
          <div class="time-slot-item">12:00</div>
          <div class="time-slot-item">13:00</div>
          <div class="time-slot-item">14:00</div>
          <div class="time-slot-item">15:00</div>
          <div class="time-slot-item disabled">16:00</div>
          <div class="time-slot-item disabled">17:00</div>
          <div class="time-slot-item">18:00</div>
          <div class="time-slot-item">19:00</div>
          <div class="time-slot-item">20:00</div>
        </div>
      </div>

      <div class="section-block">
        <div class="card-custom" style="background-color: var(--warning-light); border-color: var(--warning);">
          <div class="d-flex gap-sm">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#EA580C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0; margin-top: 2px;">
              <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <div class="text-small" style="color: var(--warning); line-height: 1.6;">
              已选时段：08:00 - 11:00（3小时）<br>
              请在预约时间前 15 分钟内完成签到
            </div>
          </div>
        </div>
      </div>

      <div class="section-block">
        <a href="booking-submit.html" class="btn-custom btn-custom-primary btn-full-width">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 11-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          确认预约
        </a>
        <a href="seat-list.html" class="btn-custom btn-custom-secondary btn-full-width mt-lg">返回座位列表</a>
      </div>

      <div style="height: 32px;"></div>
    </div>
  </div>
</body>
</html>
